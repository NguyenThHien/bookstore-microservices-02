{% extends 'base.html' %}
{% block title %}Đăng ký - BookStore{% endblock %}
{% block content %}

<div class="auth-container">
    <div class="auth-card">
        <div style="text-align:center;margin-bottom:2rem;">
            <div style="font-size:3rem;margin-bottom:0.5rem;">✨</div>
            <h1 class="auth-title">Tạo tài khoản</h1>
            <p class="auth-subtitle">Tham gia BookStore và bắt đầu đọc sách ngay!</p>
        </div>

        {% if error %}
        <div class="alert alert-error">⚠️ {{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="name">👤 Họ và tên</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="Nguyễn Văn A" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="email">📧 Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">🔒 Mật khẩu</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Tối thiểu 6 ký tự" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:0.5rem;">
                Tạo tài khoản →
            </button>
        </form>

        <div class="auth-link">
            Đã có tài khoản? <a href="{% url 'login' %}">Đăng nhập</a>
        </div>
    </div>
</div>

{% endblock %}
