version: '3.8'

services:
  customer-service:
    build: ./customer-service
    ports:
      - "8001:8000"
    networks:
      - bookstore
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.socket(); s.connect(('localhost', 8000)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5

  staff-service:
    build: ./staff-service
    ports:
      - "8010:8000"
    networks:
