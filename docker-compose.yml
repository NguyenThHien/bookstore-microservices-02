    volumes:
      - ./api-gateway/api_gateway:/app/api_gateway
      - ./api-gateway/templates:/app/templates
      - ./api-gateway/static:/app/static
    depends_on:
      customer-service:
        condition: service_healthy
      staff-service:
        condition: service_healthy
      manager-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      pay-service:
        condition: service_healthy
      ship-service:
        condition: service_healthy
      comment-rate-service:
        condition: service_healthy
      recommender-ai-service:
        condition: service_healthy
    networks:
      - bookstore

networks:
  bookstore:
    driver: bridge

volumes: {}